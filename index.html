<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembuat Kartu Ucapan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-pink-50 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md">
        <h1 class="text-3xl font-bold text-pink-600 text-center mb-2" style="font-family: cursive;">Kartu Ucapan</h1>
        <p class="text-center text-gray-500 mb-6">Pilih file dari HP, link otomatis pendek ✨</p>
        
        <form id="formUcapan" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-pink-700 mb-1">NAMA TUJUAN</label>
                <input type="text" id="nama" class="w-full border-2 border-pink-200 rounded-xl p-3" placeholder="Contoh: Andi" required>
            </div>
            <div>
                <label class="block text-xs font-bold text-pink-700 mb-1">FOTO ORANGNYA (Dari HP)</label>
                <input type="file" id="fotoTujuan" accept="image/*" class="w-full border-2 border-pink-200 rounded-xl p-2 bg-pink-50/50" required>
            </div>
            <div>
                <label class="block text-xs font-bold text-pink-700 mb-1">FOTO LATAR (Dari HP - Opsional)</label>
                <input type="file" id="fotoLatar" accept="image/*" class="w-full border-2 border-pink-200 rounded-xl p-2 bg-pink-50/50">
            </div>
            <div>
                <label class="block text-xs font-bold text-pink-700 mb-1">KATA-KATA UTAMA</label>
                <textarea id="pesan" class="w-full border-2 border-pink-200 rounded-xl p-3 h-24" placeholder="Tulis kata-kata romantis di sini..." required></textarea>
            </div>
            <div>
                <label class="block text-xs font-bold text-pink-700 mb-1">TANDA TANGAN PENGIRIM</label>
                <input type="text" id="ttd" class="w-full border-2 border-pink-200 rounded-xl p-3" placeholder="Contoh: Dari Rajen" required>
            </div>
            <div>
                <label class="block text-xs font-bold text-pink-700 mb-1">MUSIK LATAR (.MP3 Dari HP)</label>
                <input type="file" id="musik" accept="audio/*" class="w-full border-2 border-pink-200 rounded-xl p-2 bg-pink-50/50" required>
            </div>
            <button type="submit" class="w-full bg-pink-600 text-white font-bold rounded-full py-4 mt-4 shadow-lg hover:bg-pink-700">
                Buat Link Kartu Ucapan 💌
            </button>
        </form>
    </div>

    <script>
        // Fungsi rahasia untuk upload file dari HP ke server cloud publik (Catbox)
        async function uploadKeCloud(file) {
            const formData = new FormData();
            formData.append('reqtype', 'fileupload');
            formData.append('fileToUpload', file);
            
            const response = await fetch('https://catbox.moe/user/api.php', {
                method: 'POST',
                body: formData
            });
            
            if (!response.ok) throw new Error("Gagal upload");
            return await response.text(); // Mengembalikan link super pendek
        }

        document.getElementById('formUcapan').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            Swal.fire({
                title: 'Mengunggah File...',
                html: 'Tunggu sebentar ya, sedang menyimpan foto dan lagu dari HP Anda ke internet agar bisa dibuka siapa saja.',
                allowOutsideClick: false,
                didOpen: () => { Swal.showLoading(); }
            });

            try {
                const namaTujuan = document.getElementById('nama').value.trim().toLowerCase().replace(/\s+/g, '-');
                
                // Ambil file dari input form
                const fileTujuanObj = document.getElementById('fotoTujuan').files[0];
                const fileLatarObj = document.getElementById('fotoLatar').files[0];
                const fileMusikObj = document.getElementById('musik').files[0];

                // Proses upload satu per satu
                const linkTujuan = await uploadKeCloud(fileTujuanObj);
                const linkMusik = await uploadKeCloud(fileMusikObj);
                let linkLatar = "";
                if (fileLatarObj) {
                    linkLatar = await uploadKeCloud(fileLatarObj);
                }

                // Data yang dibungkus sekarang sangat kecil karena hanya berisi teks link, bukan file mentah!
                const data = {
                    n: document.getElementById('nama').value,
                    p: document.getElementById('pesan').value,
                    t: document.getElementById('ttd').value,
                    ft: linkTujuan,
                    fl: linkLatar,
                    m: linkMusik
                };

                const dataKecil = btoa(encodeURIComponent(JSON.stringify(data)));
                
                const currentUrl = window.location.href.split('index.html')[0];
                const baseUrl = currentUrl.endsWith('/') ? currentUrl : currentUrl + '/';
                
                // Hasil link pendek: untuk-mu-six.vercel.app/andi?d=kodekecil
                const finalLink = baseUrl + namaTujuan + "?d=" + dataKecil;

                Swal.fire({
                    icon: 'success',
                    title: '<span style="font-family:cursive; color:#d81b60">Sukses!</span>',
                    html: `<div class="border-2 border-pink-200 border-dashed p-3 rounded-xl text-pink-600 font-bold break-all text-sm mb-3">${finalLink}</div>`,
                    showCancelButton: true,
                    confirmButtonText: 'Kirim WhatsApp',
                    cancelButtonText: 'Tutup',
                    confirmButtonColor: '#25D366',
                    cancelButtonColor: '#d33'
                }).then((result) => {
                    if (result.isConfirmed) {
                        window.open(`https://api.whatsapp.com/send?text=Hai, ada sesuatu yang spesial buat kamu nih: ${finalLink}`);
                    }
                });

            } catch (err) {
                Swal.fire('Error', 'Proses gagal. Pastikan koneksi internet stabil.', 'error');
            }
        });
    </script>
</body>
</html>
