<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Surat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-pink-50 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md">
        <h1 class="text-3xl font-bold text-pink-600 text-center mb-2" style="font-family: cursive;">Dashboard Surat</h1>
        <p class="text-center text-gray-500 mb-6">buat surat, link langsung jadi ✨</p>
        
        <form id="formSurat" class="space-y-4">
            <div>
                <label class="block text-xs font-bold text-pink-700 mb-1">NAMA PANGGILAN</label>
                <input type="text" id="nama" class="w-full border-2 border-pink-200 rounded-xl p-3" required>
            </div>
            <div>
                <label class="block text-xs font-bold text-pink-700 mb-1">ISI SURAT</label>
                <textarea id="pesan" class="w-full border-2 border-pink-200 rounded-xl p-3 h-28" required></textarea>
            </div>
            <div>
                <label class="block text-xs font-bold text-pink-700 mb-1">TANDA TANGAN (Contoh: Dari, Aku)</label>
                <input type="text" id="ttd" class="w-full border-2 border-pink-200 rounded-xl p-3" required>
            </div>
            <div>
                <label class="block text-xs font-bold text-pink-700 mb-1">LINK FOTO LATAR (JPG/PNG)</label>
                <input type="url" id="foto" class="w-full border-2 border-pink-200 rounded-xl p-3" placeholder="https://..." required>
            </div>
            <div>
                <label class="block text-xs font-bold text-pink-700 mb-1">LINK MUSIK (MP3)</label>
                <input type="url" id="musik" class="w-full border-2 border-pink-200 rounded-xl p-3" placeholder="https://..." required>
            </div>
            <button type="submit" class="w-full bg-pink-600 text-white font-bold rounded-full py-4 mt-4 shadow-lg hover:bg-pink-700">
                Buat Link Surat 💌
            </button>
        </form>
    </div>

    <script>
        document.getElementById('formSurat').addEventListener('submit', function(e) {
            e.preventDefault();
            const data = {
                n: document.getElementById('nama').value,
                p: document.getElementById('pesan').value,
                t: document.getElementById('ttd').value,
                f: document.getElementById('foto').value,
                m: document.getElementById('musik').value
            };
            
            // Konversi ke Base64 agar menjadi link acak tanpa database
            const encodedData = btoa(encodeURIComponent(JSON.stringify(data)));
            
            const currentUrl = window.location.href.split('index.html')[0];
            const baseUrl = currentUrl.endsWith('/') ? currentUrl : currentUrl + '/';
            const finalLink = baseUrl + "surat.html?s=" + encodedData;

            Swal.fire({
                icon: 'success',
                title: '<span style="font-family:cursive; color:#d81b60">Surat buat dia udah siap!</span>',
                html: `<div class="border-2 border-pink-200 border-dashed p-3 rounded-xl text-pink-600 font-bold break-all text-xs mb-3">${finalLink}</div>`,
                showCancelButton: true,
                confirmButtonText: 'Kirim lewat WhatsApp',
                cancelButtonText: 'Tutup',
                confirmButtonColor: '#25D366',
                cancelButtonColor: '#d33'
            }).then((result) => {
                if (result.isConfirmed) {
                    window.open(`https://api.whatsapp.com/send?text=Hai, ada surat buat kamu nih: ${finalLink}`);
                }
            });
        });
    </script>
</body>
</html>
