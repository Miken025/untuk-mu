    <script>
        let currentSlide = 0;

        function gantiSlide(n) {
            const slides = document.querySelectorAll('.slide');
            slides[currentSlide].classList.remove('active');
            currentSlide = n;
            slides[currentSlide].classList.add('active');
        }

        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const targetName = urlParams.get('to');
            
            if(targetName) {
                // Ambil data dari penyimpanan lokal berdasarkan nama tujuan
                const savedData = localStorage.getItem('ucapan_' + targetName);
                
                if(savedData) {
                    const data = JSON.parse(savedData);
                    
                    document.getElementById('displayNama').innerText = data.n;
                    document.getElementById('displayPesan').innerText = data.p;
                    document.getElementById('displayTtd').innerText = data.t;
                    document.getElementById('displayFotoTujuan').src = data.ft;
                    
                    if(data.fl) {
                        document.getElementById('bgImage').style.backgroundImage = `url('${data.fl}')`;
                    } else {
                        document.getElementById('bgImage').style.backgroundImage = `url('${data.ft}')`;
                    }
                    
                    document.getElementById('bgMusic').src = data.m;
                } else {
                    Swal.fire('Ups', 'Data kartu ucapan tidak ditemukan atau sudah kedaluwarsa.', 'warning');
                }
            } else {
                Swal.fire('Ups', 'Tautan tidak valid.', 'error');
            }
        };

        function mulaiKejutan() {
            const intro = document.getElementById('introScreen');
            intro.style.opacity = 0;
            setTimeout(() => {
                intro.style.display = 'none';
            }, 700);

            const main = document.getElementById('mainContainer');
            main.style.opacity = 1;
            main.style.pointerEvents = 'auto';

            const music = document.getElementById('bgMusic');
            music.play().catch(e => console.log("Audio play blocked"));
        }
    </script>
