<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surat Spesial Untukmu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Efek animasi tambahan */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animasi-ngambang {
            animation: float 3s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-pink-100 flex items-center justify-center min-h-screen bg-cover bg-center bg-fixed transition-all duration-700" id="bodyLatar">

    <!-- Layar Sentuh Awal (Wajib agar musik bisa memutar otomatis di HP) -->
    <div id="layarAwal" class="fixed inset-0 bg-pink-200 flex flex-col items-center justify-center z-50">
        <div class="animasi-ngambang text-center">
            <div class="text-6xl mb-4">💌</div>
            <h1 class="text-2xl font-bold text-pink-600 mb-6" style="font-family: cursive;">Ada pesan spesial buat kamu...</h1>
            <button onclick="bukaSurat()" class="bg-pink-600 text-white px-8 py-3 rounded-full font-bold shadow-xl hover:bg-pink-700 active:scale-95 transition-all">
                Buka Surat
            </button>
        </div>
    </div>

    <!-- Isi Kartu Ucapan -->
    <div id="isiSurat" class="hidden bg-white/85 backdrop-blur-sm p-8 rounded-3xl shadow-2xl w-full max-w-md mx-4 text-center transform transition-all">
        <!-- Foto Utama -->
        <img id="fotoUtama" src="" class="w-40 h-40 object-cover rounded-full mx-auto border-4 border-pink-400 shadow-lg mb-5" alt="Foto">
        
        <!-- Teks -->
        <h2 class="text-2xl font-bold text-pink-600 mb-4" style="font-family: cursive;">Untuk: <span id="namaTujuan"></span></h2>
        
        <div class="bg-pink-50/50 p-4 rounded-2xl mb-6 shadow-inner">
            <p id="pesanUtama" class="text-gray-700 whitespace-pre-wrap italic leading-relaxed"></p>
        </div>
        
        <p class="text-sm font-bold text-pink-500">Dari: <span id="ttdPengirim"></span></p>
    </div>

    <!-- Pemutar Musik -->
    <audio id="musikLatar" loop></audio>

    <script>
        // Fungsi untuk mengambil dan memecah data dari link
        window.onload = function() {
            try {
                // Ambil parameter '?d=' dari URL web
                const urlParams = new URLSearchParams(window.location.search);
                const dataRahasia = urlParams.get('d');
                
                if (!dataRahasia) {
                    throw new Error("Pesan tidak ditemukan.");
                }

                // Terjemahkan data
                const dataAsli = JSON.parse(decodeURIComponent(atob(dataRahasia)));

                // Masukkan data ke dalam halaman web
                document.getElementById('namaTujuan').innerText = dataAsli.n;
                document.getElementById('pesanUtama').innerText = dataAsli.p;
                document.getElementById('ttdPengirim').innerText = dataAsli.t;
                
                // Masukkan link foto dan musik dari Vercel Blob
                document.getElementById('fotoUtama').src = dataAsli.ft;
                document.getElementById('musikLatar').src = dataAsli.m;

                // Jika ada foto latar, pasang di background
                if (dataAsli.fl && dataAsli.fl !== "") {
                    document.getElementById('bodyLatar').style.backgroundImage = `url('${dataAsli.fl}')`;
                }

            } catch (error) {
                alert("Maaf, link surat ini rusak atau tidak valid.");
                console.error(error);
            }
        };

        // Fungsi saat tombol Buka Surat ditekan
        function bukaSurat() {
            // Hilangkan layar awal
            document.getElementById('layarAwal').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('layarAwal').classList.add('hidden');
                // Tampilkan isi surat
                document.getElementById('isiSurat').classList.remove('hidden');
                // Putar musik
                document.getElementById('musikLatar').play().catch(e => console.log("Musik diblokir browser: ", e));
            }, 500);
        }
    </script>
</body>
</html>
