<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spesial Untukmu ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(1.5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        @keyframes pulseGlow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.08); }
        }
        .animate-float { animation: float 4s ease-in-out infinite; }
        .animate-glow { animation: pulseGlow 3s ease-in-out infinite; }
        
        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.25); border-radius: 10px; }
    </style>
</head>
<body id="bodyTema" class="bg-slate-950 text-slate-100 min-h-screen flex items-center justify-center relative overflow-x-hidden font-sans">

    <!-- BACKGROUND ANIMASI & BLUR -->
    <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
        <div id="bgBlurImage" class="absolute inset-0 bg-cover bg-center filter blur-3xl opacity-25 scale-110 transition-all duration-1000"></div>
        <div id="bgGradient" class="absolute inset-0 bg-gradient-to-br from-slate-950 via-slate-900 to-purple-950 opacity-90 transition-all duration-1000"></div>
        <div class="absolute top-1/4 left-1/4 w-80 h-80 bg-amber-500/10 rounded-full blur-3xl animate-glow"></div>
        <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl animate-glow" style="animation-delay: 1.5s;"></div>
    </div>

    <!-- AUDIO & TOMBOL MUSIK MINIMALIS -->
    <audio id="musikLatar" loop></audio>
    <button onclick="toggleMusik()" id="btnMusik" class="fixed top-5 right-5 z-50 bg-white/10 hover:bg-white/20 backdrop-blur-md border border-white/20 p-3 rounded-full shadow-2xl transition-all flex items-center justify-center text-white text-xl hidden">
        <span id="ikonMusik">🎵</span>
    </button>

    <!-- LAYAR UTAMA (PEMBUKA) -->
    <div id="layarAwal" class="relative z-10 text-center p-6 max-w-sm w-full mx-4">
        <div class="bg-white/10 backdrop-blur-2xl border border-white/20 p-8 rounded-3xl shadow-2xl animate-float">
            <div class="text-6xl mb-4">💌</div>
            <h1 class="text-2xl font-semibold tracking-wide mb-2 text-amber-200">Sebuah Pesan Khusus</h1>
            <p class="text-slate-300 text-sm mb-6">Sentuh untuk membuka lembaran cerita ini...</p>
            <button onclick="bukaSurat()" id="btnBuka" class="w-full bg-gradient-to-r from-amber-500 to-rose-500 text-white font-medium py-3.5 px-6 rounded-2xl shadow-lg hover:opacity-95 active:scale-95 transition-all tracking-wider">
                BUKA SURAT
            </button>
        </div>
    </div>

    <!-- ISI KARTU UCAPAN (FULL LAYAR & BERKESAN) -->
    <div id="isiSurat" class="hidden relative z-10 w-full max-w-lg mx-auto p-4 md:p-6 transition-all duration-700 opacity-0 transform translate-y-4">
        <div class="bg-slate-900/75 backdrop-blur-2xl border border-white/15 rounded-3xl shadow-2xl overflow-hidden p-6 md:p-8">
            
            <!-- TOMBOL KEMBALI -->
            <div class="flex justify-between items-center mb-6">
                <button onclick="resetSurat()" class="text-xs tracking-wider uppercase text-slate-400 hover:text-white bg-white/5 border border-white/10 px-3 py-1.5 rounded-full transition-all flex items-center gap-1">
                    ← Kembali
                </button>
                <span class="text-xs uppercase tracking-widest text-amber-300/80 font-medium">Special Edition</span>
            </div>

            <!-- BAGIAN GALERI GESER (YANG BISA BANYAK SAMPAI CAPEK) -->
            <div id="sectionSlider" class="mb-6 hidden">
                <div class="flex items-center justify-between mb-2">
                    <p class="text-[11px] uppercase tracking-widest text-slate-400 font-medium">Galeri Kenangan Kita</p>
                    <span class="text-[10px] text-amber-300/80 bg-white/5 px-2 py-0.5 rounded-full border border-white/10">Geser ke samping 👉</span>
                </div>
                <!-- Container Geser Dengan Efek Snap Modern -->
                <div id="containerSlider" class="flex gap-3 overflow-x-auto pb-3 pt-1 px-1 snap-x scroll-smooth">
                    <!-- Foto kecil galeri masuk otomatis -->
                </div>
            </div>

            <!-- FOTO UTAMA (PUNCAK / UTAMA) -->
            <div class="mb-6 text-center">
                <div class="inline-block p-3 bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl shadow-xl transform rotate-1 hover:rotate-0 transition-transform duration-500">
                    <img id="fotoUtama" src="" class="w-48 h-48 md:w-56 md:h-56 object-cover rounded-xl shadow-md mx-auto" alt="Puncak Kenangan">
                </div>
                <p class="text-[10px] uppercase tracking-widest text-amber-200/70 mt-2 font-medium">Puncak Cerita</p>
            </div>

            <!-- NAMA TUJUAN -->
            <div class="text-center mb-6">
                <h2 class="text-xs uppercase tracking-widest text-slate-400 mb-1">Kepada</h2>
                <h3 id="namaTujuan" class="text-3xl font-bold tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-amber-200 via-rose-300 to-amber-100"></h3>
            </div>

            <!-- KATA-KATA UTAMA / PESAN -->
            <div class="bg-black/35 border border-white/10 p-5 rounded-2xl mb-6 shadow-inner">
                <p id="pesanUtama" class="text-slate-200 text-sm md:text-base leading-relaxed whitespace-pre-wrap text-center font-light"></p>
            </div>

            <!-- TANDA TANGAN -->
            <div class="text-center">
                <p class="text-xs text-slate-400 uppercase tracking-widest mb-1">Dari Seseorang</p>
                <p id="ttdPengirim" class="text-lg font-medium text-amber-200 tracking-wide"></p>
            </div>

        </div>
    </div>

    <script>
        let isPlaying = false;
        let audioElemen = document.getElementById('musikLatar');

        window.onload = function() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const dataRahasia = urlParams.get('d');
                
                if (!dataRahasia) throw new Error("Data tidak ditemukan.");

                const dataAsli = JSON.parse(decodeURIComponent(atob(dataRahasia)));

                // Terapkan Tema Warna Sesuai Pilihan Admin
                terapkanTema(dataAsli.tema);

                document.getElementById('namaTujuan').innerText = dataAsli.n;
                document.getElementById('pesanUtama').innerText = dataAsli.p;
                document.getElementById('ttdPengirim').innerText = dataAsli.t;
                
                document.getElementById('fotoUtama').src = dataAsli.ft;
                document.getElementById('bgBlurImage').style.backgroundImage = `url('${dataAsli.ft}')`;
                audioElemen.src = dataAsli.m;

                // SISTEM SLIDER / GALERI FOTO BANYAK (BISA BIKIN CAPEK NGE-GESER)
                const containerSlider = document.getElementById('containerSlider');
                const sectionSlider = document.getElementById('sectionSlider');
                
                if (dataAsli.galeri && dataAsli.galeri.length > 0) {
                    sectionSlider.classList.remove('hidden');
                    containerSlider.innerHTML = '';
                    dataAsli.galeri.forEach((urlFoto) => {
                        containerSlider.innerHTML += `
                            <div class="flex-shrink-0 snap-center">
                                <img src="${urlFoto}" class="w-24 h-24 md:w-28 md:h-28 object-cover rounded-xl border border-white/20 shadow-lg transform hover:scale-105 transition-all cursor-pointer" onclick="document.getElementById('fotoUtama').src='${urlFoto}'" alt="Kenangan">
                            </div>
                        `;
                    });
                }

            } catch (error) {
                alert("Maaf, tautan surat ini tidak valid.");
                console.error(error);
            }
        };

        function terapkanTema(kodeTema) {
            const grad = document.getElementById('bgGradient');
            const btnBuka = document.getElementById('btnBuka');
            
            if (kodeTema === 'emerald') {
                grad.className = "absolute inset-0 bg-gradient-to-br from-slate-950 via-emerald-950 to-slate-900 opacity-90 transition-all duration-1000";
                btnBuka.className = "w-full bg-gradient-to-r from-emerald-500 to-teal-600 text-white font-medium py-3.5 px-6 rounded-2xl shadow-lg hover:opacity-95 active:scale-95 transition-all tracking-wider";
            } else if (kodeTema === 'sunset') {
                grad.className = "absolute inset-0 bg-gradient-to-br from-slate-950 via-orange-950 to-purple-950 opacity-90 transition-all duration-1000";
                btnBuka.className = "w-full bg-gradient-to-r from-amber-500 to-orange-600 text-white font-medium py-3.5 px-6 rounded-2xl shadow-lg hover:opacity-95 active:scale-95 transition-all tracking-wider";
            } else if (kodeTema === 'crimson') {
                grad.className = "absolute inset-0 bg-gradient-to-br from-slate-950 via-rose-950 to-red-950 opacity-90 transition-all duration-1000";
                btnBuka.className = "w-full bg-gradient-to-r from-rose-600 to-red-700 text-white font-medium py-3.5 px-6 rounded-2xl shadow-lg hover:opacity-95 active:scale-95 transition-all tracking-wider";
            } else {
                // Default Midnight
                grad.className = "absolute inset-0 bg-gradient-to-br from-slate-950 via-slate-900 to-purple-950 opacity-90 transition-all duration-1000";
                btnBuka.className = "w-full bg-gradient-to-r from-amber-500 to-rose-500 text-white font-medium py-3.5 px-6 rounded-2xl shadow-lg hover:opacity-95 active:scale-95 transition-all tracking-wider";
            }
        }

        function bukaSurat() {
            const layarAwal = document.getElementById('layarAwal');
            const isiSurat = document.getElementById('isiSurat');
            const btnMusik = document.getElementById('btnMusik');

            layarAwal.style.opacity = '0';
            setTimeout(() => {
                layarAwal.classList.add('hidden');
                isiSurat.classList.remove('hidden');
                setTimeout(() => {
                    isiSurat.classList.remove('opacity-0', 'translate-y-4');
                }, 50);

                audioElemen.play().then(() => {
                    isPlaying = true;
                    btnMusik.classList.remove('hidden');
                    document.getElementById('ikonMusik').innerText = '🔊';
                }).catch(e => {
                    btnMusik.classList.remove('hidden');
                    document.getElementById('ikonMusik').innerText = '🔇';
                });
            }, 500);
        }

        function resetSurat() {
            const layarAwal = document.getElementById('layarAwal');
            const isiSurat = document.getElementById('isiSurat');
            
            isiSurat.classList.add('opacity-0', 'translate-y-4');
            setTimeout(() => {
                isiSurat.classList.add('hidden');
                layarAwal.classList.remove('hidden');
                layarAwal.style.opacity = '1';
            }, 500);
        }

        function toggleMusik() {
            const ikon = document.getElementById('ikonMusik');
            if (isPlaying) {
                audioElemen.pause();
                isPlaying = false;
                ikon.innerText = '🔇';
            } else {
                audioElemen.play();
                isPlaying = true;
                ikon.innerText = '🔊';
            }
        }
    </script>
</body>
</html>
